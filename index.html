<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4caf50">
    <script src="myNotesApp.js" defer></script>
    <title>My Notes App</title>
</head>
<body>
    <header class="app-header">
        <div class="header-container">
            <h1 class="app-title">
                <i class="fa-solid fa-note-sticky"></i> My Notes App
            </h1>
            <button class="btn-settings" aria-label="Settings">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </header>

    <div id="settings-panel" class="settings-panel hidden">
        <h2>App Settings</h2>
        <div class="setting-item">
            <label for="font-select">Font Style</label>
            <select id="font-select">
                <option value="Segoe UI, sans-serif">Modern (Default)</option>
                <option value="Georgia, serif">Elegant (Classic)</option>
                <option value="Courier New, monospace">Code (Monospace)</option>
                <option value="Comic Sans MS, cursive">Playful</option>
            </select>
        </div>
        <div class="setting-item">
            <label for="palette-select">Theme Palette</label>
            <select id="palette-select">
                <option value="default">Default Light</option>
                <option value="ocean">Ocean Breeze</option>
                <option value="sunset">Sunset Warmth</option>
                <option value="cyberpunk">Cyberpunk Neon</option>
            </select>
        </div>
        <div class="setting-item">
            <label for="lang-select">Language / Idioma</label>
            <select id="lang-select">
                <option value="en">English</option>
                <option value="es">Español</option>
            </select>
        </div>
    </div>

    <div class="creators-wrapper">
        <div class="app-container">
            <h2>New Checklist</h2>
            <div class="input-section">
                <input type="text" id="checklist-title-input" placeholder="Checklist Title...">
                <button id="create-list-btn">Create List</button>
            </div> 
        </div>

        <div class="note-creator">
            <h2>New Note</h2>
            <div class="input-section">
                <input type="text" id="note-title-input" placeholder="Note Title...">
                <button id="create-note-btn">Create Note</button>
            </div>
        </div>
    </div>

    <hr>
    
    <div class="workspace-layout">
        <div class="column-section">
            <h2 id="notes-column-title" class="column-header">Notes</h2>
            <div id="notes-display" class="cards-list"></div>
        </div>
        <div class="column-section">
            <h2 id="lists-column-title" class="column-header">Checklists</h2>
            <div id="checklists-display" class="cards-list"></div>
        </div>
    </div>
    
    <footer class="app-footer">
        <div class="footer-container">
            <p class="footer-cred">By <span>Ronmel Gadea</span></p>
            <div class="footer-location">
                <i class="fa-solid fa-location-dot"></i>
                <span>San José, Costa Rica</span>
            </div>
        </div>
    </footer>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('PWA Service Worker Active!', reg.scope))
                    .catch(err => console.log('Service Worker setup failed: ', err));
            });
        }
    </script>
</body>
</html>
