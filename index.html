<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4caf50">
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script src="myNoteApp.js" defer></script>
    
    <title>My Notes App</title>
</head>
<body>
<div id="auth-overlay" class="creation-overlay">
    <div class="overlay-glass-card" style="max-width: 400px; text-align: center;">
        
        <div style="margin-bottom: 20px;">
            <img src="creator_logo.jpg" alt="Ronmel Gadea Logo" style="width: 140px; height: 140px; border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(0, 191, 165, 0.2); object-fit: cover;">
        </div>

        <div class="overlay-header" style="justify-content: center; margin-bottom: 5px;">
            <h2>Private Workspace</h2>
        </div>
        <p style="text-align: center; font-size: 14px; opacity: 0.8; margin-bottom: 20px; color: var(--text-color);">
            Log in or create a secure private account to sync your notes.
        </p>
        
        <div class="input-section" style="flex-direction: column; gap: 12px; align-items: stretch;">
            <input type="email" id="auth-email" placeholder="Email address..." style="width: 100%;">
            <input type="password" id="auth-password" placeholder="Password (min 6 characters)..." style="width: 100%;">
            
            <button id="btn-login" class="action-glow-btn" style="margin-top: 10px;">Log In</button>
            <button id="btn-signup" class="save-card-btn" style="background-color: transparent; border: 1px solid var(--primary-color); color: var(--text-color);">Sign Up / Create Account</button>
        </div>
        
        <p id="auth-error-msg" style="color: #ff3333; font-size: 13px; text-align: center; margin-top: 15px; font-weight: bold;"></p>
    </div>
</div>
    <header class="app-header">
        <div class="header-container">
            <h1 class="app-title">
                <i class="fa-solid fa-note-sticky"></i> My Notes App
            </h1>
            <button class="btn-settings" id="settings-toggle-btn" aria-label="Settings">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </header>

    <div id="settings-panel" class="settings-panel hidden">
        <h2>App Settings</h2>
        <div class="setting-item">
            <label for="font-select">Font Style</label>
            <select id="font-select">
                <option value="Segoe UI, sans-serif">Modern (Default)</option>
                <option value="Georgia, serif">Elegant (Classic)</option>
                <option value="Courier New, monospace">Code (Monospace)</option>
                <option value="Comic Sans MS, cursive">Playful</option>
            </select>
        </div>
        <div class="setting-item">
            <label for="palette-select">Theme Palette</label>
            <select id="palette-select">
                <option value="default">Default Light</option>
                <option value="ocean">Ocean Breeze</option>
                <option value="sunset">Sunset Warmth</option>
                <option value="cyberpunk">Cyberpunk Neon</option>
            </select>
        </div>
        <div class="setting-item">
            <label for="lang-select">Language / Idioma</label>
            <select id="lang-select">
                <option value="en">English</option>
                <option value="es">Español</option>
            </select>
        </div>
    </div>

    <div id="creation-overlay" class="creation-overlay hidden">
        <div class="overlay-glass-card">
            <div class="overlay-header">
                <h2 id="creation-overlay-title">Create New Item</h2>
                <button id="close-overlay-btn" class="close-overlay-btn">&times;</button>
            </div>
            
            <div class="creators-wrapper">
                <div class="creator-card">
                    <h2 id="new-checklist-title">New Checklist</h2>
                    <div class="input-section">
                        <input type="text" id="checklist-title-input" placeholder="Checklist Title...">
                        <button id="create-list-btn" class="action-glow-btn">Create List</button>
                    </div> 
                </div>

                <div class="creator-card">
                    <h2 id="new-note-title">New Note</h2>
                    <div class="input-section">
                        <input type="text" id="note-title-input" placeholder="Note Title...">
                        <button id="create-note-btn" class="action-glow-btn">Create Note</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="workspace-layout">
        <div class="column-section">
            <h2 id="notes-column-title" class="column-header">Notes</h2>
            <div id="notes-display" class="cards-list"></div>
        </div>
        <div class="column-section">
            <h2 id="lists-column-title" class="column-header">Checklists</h2>
            <div id="checklists-display" class="cards-list"></div>
        </div>
    </div>

    <button id="floating-add-btn" class="floating-add-btn" aria-label="Add Item">+</button>
    
    <footer class="app-footer">
        <div class="footer-container">
            <p class="footer-cred">By <span>Ronmel Gadea</span></p>
            <div class="footer-location">
                <i class="fa-solid fa-location-dot"></i>
                <span>San José, Costa Rica</span>
            </div>
        </div>
    </footer>
</body>
</html>
